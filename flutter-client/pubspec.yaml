name: kaftar_client
description: Cross-platform Kaftar messenger client.
publish_to: 'none'
version: 1.0.0+41

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.7
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.1
  flutter_background: ^1.3.1
  flutter_local_notifications: ^19.4.1
  flutter_webrtc: ^1.3.0
  http: ^1.5.0
  http_parser: ^4.1.2
  livekit_client: ^2.5.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  video_player: ^2.10.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true








































